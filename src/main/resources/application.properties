spring.application.name=users

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/finance_users?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=finance
spring.datasource.password=finance
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=VARCHAR

# Logging
logging.file.path=logs/requests.log

# Springdoc / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
